# .goreleaser.yaml — Wave 4 release pipeline (ADR-030)
# Naming contract: engx-<version>-<os>-<arch>.tar.gz  ← DO NOT CHANGE
# See: architecture/decisions/ADR-030-goreleaser-pipeline.md
version: 2

project_name: engx

before:
  hooks:
    - go mod tidy

# ── LINUX + WINDOWS BUILDS ────────────────────────────────────────────────────
builds:
  # engxd — CGO on (sqlite3), linux only
  - id: engxd-linux
    binary: bin/engxd
    main: ./cmd/engxd/
    env:
      - CGO_ENABLED=1
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.daemonVersion={{.Version}}

  # engx — CGO off, linux + windows
  - id: engx-linux-windows
    binary: bin/engx
    main: ./cmd/engx/
    env:
      - CGO_ENABLED=0
    goos: [linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.cliVersion={{.Version}}

  # engxa — CGO off, linux + windows
  - id: engxa-linux-windows
    binary: bin/engxa
    main: ./cmd/engxa/
    env:
      - CGO_ENABLED=0
    goos: [linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

# ── ARCHIVES ──────────────────────────────────────────────────────────────────
archives:
  - id: default
    builds: [engxd-linux, engx-linux-windows, engxa-linux-windows]
    # Naming contract — matched by internal/upgrade/release.go and scripts/install.sh
    name_template: "engx-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    wrap_in_directory: false
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

# ── CHECKSUMS ─────────────────────────────────────────────────────────────────
checksum:
  name_template: "engx-{{ .Version }}-checksums.txt"
  algorithm: sha256

# ── CHANGELOG ─────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# ── RELEASE ───────────────────────────────────────────────────────────────────
release:
  github:
    owner: Harshmaury
    name: Nexus
  prerelease: auto   # tags with -rc/-beta/-alpha → pre-release
  draft: false
