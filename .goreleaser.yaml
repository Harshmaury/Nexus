# .goreleaser.yaml — engx release pipeline (ADR-030)
# Produces: engx-<version>-<os>-<arch>.tar.gz + checksums
# Triggered by: git tag v* push → .github/workflows/release.yml
version: 2

project_name: engx

before:
  hooks:
    - go mod tidy

builds:
  # engxd — requires CGO (SQLite). Linux + macOS only.
  - id: engxd
    binary: bin/engxd
    main: ./cmd/engxd
    env:
      - CGO_ENABLED=1
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.daemonVersion={{.Version}}
    hooks:
      post: []

  # engx CLI — pure Go. Linux + macOS + Windows.
  - id: engx
    binary: bin/engx
    main: ./cmd/engx
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.cliVersion={{.Version}}

  # engxa agent — pure Go. Linux + macOS + Windows.
  - id: engxa
    binary: bin/engxa
    main: ./cmd/engxa
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: platform
    name_template: "engx-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    wrap_in_directory: false
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "engx-{{ .Version }}-checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Harshmaury
    name: Nexus
  draft: false
  prerelease: auto
  name_template: "engx v{{ .Version }}"
  header: |
    ## engx {{ .Version }}

    ```bash
    curl -fsSL https://get.engx.dev/install.sh | bash
    engx upgrade
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
